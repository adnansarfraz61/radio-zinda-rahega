<!doctype html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ریڈیو زندہ رہے گا — RTL Flipbook</title>
  <meta name="description" content="ریڈیو زندہ رہے گا — سر فراز خان ناغر کی کتاب کا RTL فلپ بک ریڈر" />
  <style>
    :root{
      --bg:#0b0705; --panel:#17100c; --panel2:#211712; --gold:#f4b64a; --text:#f8efe2; --muted:#c9b8a0; --line:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#2a1b12 0,#0b0705 45%,#050403 100%);color:var(--text);font-family:"Noto Nastaliq Urdu","Jameel Noori Nastaleeq","Noto Naskh Arabic",Tahoma,Arial,sans-serif;overflow-x:hidden}
    body{display:flex;flex-direction:column}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(11,7,5,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:14px;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}.mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#ffdf8a);color:#1b120c;display:grid;place-items:center;font-weight:900;font-family:Arial}.brand h1{font-size:20px;margin:0;line-height:1.25;white-space:nowrap}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px;font-family:Tahoma,Arial,sans-serif;direction:ltr;text-align:right}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.btn{border:1px solid var(--line);background:linear-gradient(180deg,#2b211a,#17100c);color:var(--text);padding:9px 13px;border-radius:999px;cursor:pointer;font-weight:700;font-size:14px}.btn:hover{border-color:rgba(244,182,74,.55);color:#fff}.btn.primary{background:linear-gradient(135deg,var(--gold),#ffdc85);color:#21140a;border:0}.btn:disabled{opacity:.45;cursor:not-allowed}.pagebox{display:flex;align-items:center;gap:8px;color:var(--muted);font-family:Tahoma,Arial,sans-serif;font-size:13px;direction:ltr}.pagebox input{width:72px;padding:8px;border-radius:10px;border:1px solid var(--line);background:#100b08;color:var(--text);text-align:center}
    .reader{width:100%;padding:22px 14px 28px;flex:1}.hint{text-align:center;color:var(--muted);font-size:13px;margin:0 auto 16px;max-width:900px;line-height:1.8}.book-wrap{width:min(96vw,1280px);margin:0 auto;display:flex;justify-content:center;align-items:center;perspective:2000px}.spread{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;width:100%}.page-card{position:relative;background:#f8f4ee;border-radius:8px;box-shadow:0 28px 70px rgba(0,0,0,.55);overflow:hidden;min-height:420px;display:flex;align-items:center;justify-content:center}.page-card::before{content:"";position:absolute;inset:0;border:1px solid rgba(0,0,0,.08);pointer-events:none}.page-card img{display:block;width:100%;height:auto;max-height:calc(100vh - 155px);object-fit:contain;background:#f8f4ee}.page-label{position:absolute;top:10px;background:rgba(0,0,0,.62);color:#fff;border-radius:999px;padding:5px 10px;font:12px Tahoma,Arial,sans-serif;direction:ltr}.right-page .page-label{right:10px}.left-page .page-label{left:10px}.turning{animation:flip .28s ease both}@keyframes flip{0%{transform:rotateY(0) scale(1)}45%{transform:rotateY(-6deg) scale(.985);filter:brightness(.92)}100%{transform:rotateY(0) scale(1)}}
    .bottom{position:sticky;bottom:0;background:rgba(11,7,5,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 14px;display:flex;justify-content:center;gap:8px;z-index:40}.mobile-title{display:none}.loader{position:fixed;inset:0;background:#0b0705;z-index:200;display:grid;place-items:center;text-align:center;padding:24px}.loader strong{display:block;font-size:22px;margin-bottom:8px}.loader span{color:var(--muted);font-family:Tahoma,Arial,sans-serif}.hidden{display:none!important}.error{max-width:760px;margin:20px auto;background:#2a1111;border:1px solid #7d2b2b;color:#ffe6e6;border-radius:16px;padding:18px;line-height:1.8;text-align:center}
    @media (max-width:900px){.topbar{align-items:flex-start;flex-direction:column}.controls{width:100%;justify-content:center}.brand h1{font-size:18px}.reader{padding:14px 8px 22px}.spread{grid-template-columns:1fr;max-width:720px}.left-page{display:none}.page-card img{max-height:none}.hint{font-size:12px}.bottom{flex-wrap:wrap}.mobile-title{display:inline}.pagebox input{width:58px}}
    @media print{.topbar,.bottom,.hint{display:none}.reader{padding:0}.spread{display:block}.page-card{box-shadow:none;margin:0 0 10px}.page-card img{max-height:none}}
  </style>
</head>
<body>
  <div class="loader" id="loader"><div><strong>ریڈیو زندہ رہے گا</strong><span>فلپ بک لوڈ ہو رہی ہے...</span></div></div>
  <header class="topbar">
    <div class="brand"><div class="mark">R</div><div><h1>ریڈیو زندہ رہے گا</h1><p>Radio: Defying Extinction</p></div></div>
    <div class="controls">
      <button class="btn primary" id="nextTop">اگلا صفحہ</button>
      <button class="btn" id="prevTop">پچھلا صفحہ</button>
      <button class="btn" id="zoomBtn">زوم</button>
      <button class="btn" id="fsBtn">فل سکرین</button>
      <div class="pagebox"><span id="counter">1 / 495</span><input id="jump" type="number" min="1" max="495" value="1" /><button class="btn" id="goBtn">Go</button></div>
    </div>
  </header>
  <main class="reader">
    <p class="hint">یہ ریڈر اردو کتابوں کے لیے دائیں سے بائیں ترتیب میں بنایا گیا ہے۔ اگلا صفحہ پڑھنے کے لیے <b>اگلا صفحہ</b> دبائیں، کی بورڈ کے تیر استعمال کریں، یا موبائل پر سوائپ کریں۔</p>
    <div id="errorBox" class="error hidden"></div>
    <section class="book-wrap" id="bookWrap">
      <div class="spread" id="spread">
        <article class="page-card right-page" id="rightCard"><span class="page-label" id="rightLabel"></span><img id="rightImg" alt="Book page" /></article>
        <article class="page-card left-page" id="leftCard"><span class="page-label" id="leftLabel"></span><img id="leftImg" alt="Book page" /></article>
      </div>
    </section>
  </main>
  <nav class="bottom">
    <button class="btn primary" id="nextBottom">اگلا صفحہ</button>
    <button class="btn" id="prevBottom">پچھلا صفحہ</button>
    <button class="btn" id="firstBtn">شروع</button>
    <button class="btn" id="lastBtn">آخر</button>
  </nav>
<script>
(function(){
  const TOTAL=495;
  let page=1, zoom=false;
  const $=id=>document.getElementById(id);
  const rightImg=$('rightImg'), leftImg=$('leftImg'), rightLabel=$('rightLabel'), leftLabel=$('leftLabel');
  const counter=$('counter'), jump=$('jump'), spread=$('spread'), loader=$('loader'), err=$('errorBox');
  const pad=n=>String(n).padStart(3,'0');
  const candidates=n=>[`pages/page-${pad(n)}.jpg`,`page-${pad(n)}.jpg`,`pages/page-${pad(n)}.jpeg`,`page-${pad(n)}.jpeg`];
  function loadWithFallback(img,n,label){
    if(n<1||n>TOTAL){ img.removeAttribute('src'); img.style.visibility='hidden'; label.textContent=''; return; }
    img.style.visibility='visible'; label.textContent=`Page ${n}`;
    const list=candidates(n); let i=0;
    img.onerror=()=>{ i++; if(i<list.length){ img.src=list[i]; } else { showError(`صفحہ ${n} لوڈ نہیں ہو رہا۔ فائل کا نام page-${pad(n)}.jpg ہونا چاہیے، اور یہ root یا pages فولڈر میں ہونا چاہیے۔`); }};
    img.onload=()=>{ if(n===1) loader.classList.add('hidden'); };
    img.src=list[0];
  }
  function showError(msg){ err.textContent=msg; err.classList.remove('hidden'); loader.classList.add('hidden'); }
  function render(animate=true){
    page=Math.max(1,Math.min(TOTAL,page));
    if(page%2===0 && window.innerWidth>900) page--;
    err.classList.add('hidden');
    loadWithFallback(rightImg,page,rightLabel);
    loadWithFallback(leftImg,page+1,leftLabel);
    counter.textContent=`${page} / ${TOTAL}`; jump.value=page;
    document.querySelectorAll('#prevTop,#prevBottom,#firstBtn').forEach(b=>b.disabled=page<=1);
    document.querySelectorAll('#nextTop,#nextBottom,#lastBtn').forEach(b=>b.disabled=page>=TOTAL);
    if(animate){ spread.classList.remove('turning'); void spread.offsetWidth; spread.classList.add('turning'); }
  }
  function next(){ page += window.innerWidth>900 ? 2 : 1; render(); }
  function prev(){ page -= window.innerWidth>900 ? 2 : 1; render(); }
  function first(){ page=1; render(); }
  function last(){ page=TOTAL; if(window.innerWidth>900 && page%2===0) page--; render(); }
  ['nextTop','nextBottom'].forEach(id=>$(id).onclick=next);
  ['prevTop','prevBottom'].forEach(id=>$(id).onclick=prev);
  $('firstBtn').onclick=first; $('lastBtn').onclick=last;
  $('goBtn').onclick=()=>{ page=parseInt(jump.value||'1',10); render(); };
  jump.addEventListener('keydown',e=>{ if(e.key==='Enter') $('goBtn').click(); });
  $('zoomBtn').onclick=()=>{ zoom=!zoom; document.querySelector('.book-wrap').style.width=zoom?'min(1600px,100vw)':'min(96vw,1280px)'; document.querySelectorAll('.page-card img').forEach(i=>i.style.maxHeight=zoom?'none':'calc(100vh - 155px)'); };
  $('fsBtn').onclick=()=>{ const el=document.documentElement; if(!document.fullscreenElement) el.requestFullscreen?.(); else document.exitFullscreen?.(); };
  document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft') next(); if(e.key==='ArrowRight') prev(); if(e.key==='Home') first(); if(e.key==='End') last(); });
  let sx=0; document.addEventListener('touchstart',e=>sx=e.changedTouches[0].clientX,{passive:true}); document.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>50){ dx<0?next():prev(); } },{passive:true});
  window.addEventListener('resize',()=>render(false));
  setTimeout(()=>loader.classList.add('hidden'),5000);
  render(false);
})();
</script>
</body>
</html>
